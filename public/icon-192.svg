  <path d="M52 50 L28 26 L50 38 L56 56 Z" fill="#f472b6"/>
  <path d="M140 50 L164 26 L142 38 L136 56 Z" fill="#f472b6"/>
  <!-- Left eye -->
  <ellipse cx="76" cy="100" rx="22" ry="24" fill="#0a1628"/>
